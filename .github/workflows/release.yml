name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.x"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Validate tag format
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -notmatch '^refs/tags/v\d+\.\d+\.\d+$') {
            Write-Error "This workflow must be triggered from a version tag (v*.*.*), not a branch. Got: ${{ github.ref }}"
            exit 1
          }

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        shell: pwsh
        run: echo "version=$('${{ github.ref_name }}'.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj `
            -c Release -r win-x64 --self-contained `
            -o publish/win-x64

      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path publish/win-x64/* `
            -DestinationPath "BookDB-v$ver-win-x64.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: win-x64
          path: BookDB-v*-win-x64.zip

      - name: Publish win-x64 FDD
        shell: pwsh
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj `
            -c Release -r win-x64 --no-self-contained `
            -o publish/win-x64-fdd

      - name: Create FDD zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path publish/win-x64-fdd/* `
            -DestinationPath "BookDB-v$ver-win-x64-fdd.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: win-x64-fdd
          path: BookDB-v*-win-x64-fdd.zip

  build-windows-arm64:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Validate tag format
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -notmatch '^refs/tags/v\d+\.\d+\.\d+$') {
            Write-Error "This workflow must be triggered from a version tag (v*.*.*), not a branch. Got: ${{ github.ref }}"
            exit 1
          }

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        shell: pwsh
        run: echo "version=$('${{ github.ref_name }}'.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      # win-arm64 cross-compiles fine on the x64 runner; kept non-blocking like Linux/macOS.
      - name: Publish win-arm64
        shell: pwsh
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj `
            -c Release -r win-arm64 --self-contained `
            -o publish/win-arm64

      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path publish/win-arm64/* `
            -DestinationPath "BookDB-v$ver-win-arm64.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: win-arm64
          path: BookDB-v*-win-arm64.zip

      - name: Publish win-arm64 FDD
        shell: pwsh
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj `
            -c Release -r win-arm64 --no-self-contained `
            -o publish/win-arm64-fdd

      - name: Create FDD zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path publish/win-arm64-fdd/* `
            -DestinationPath "BookDB-v$ver-win-arm64-fdd.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: win-arm64-fdd
          path: BookDB-v*-win-arm64-fdd.zip

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Validate tag format
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ "${GH_REF}" != refs/tags/v[0-9]*.[0-9]*.[0-9]* ]]; then
            echo "Error: This workflow must be triggered from a version tag (v*.*.*). Got: ${GH_REF}"
            exit 1
          fi

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish linux-x64
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj \
            -c Release -r linux-x64 --self-contained \
            -o publish/linux-x64

      - name: Create tar.gz
        run: |
          ver="${{ steps.version.outputs.version }}"
          tar -czf "BookDB-v${ver}-linux-x64.tar.gz" -C publish/linux-x64 .

      - name: Build AppImage
        run: bash scripts/make-appimage.sh "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: linux-x64
          path: |
            BookDB-v*-linux-x64.tar.gz
            BookDB-v*-x86_64.AppImage

  # Native ARM64 Linux runner (free on public repos) so appimagetool packages the aarch64
  # AppImage natively — cleaner than cross-building an arm64 AppImage on an x64 host.
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Validate tag format
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ "${GH_REF}" != refs/tags/v[0-9]*.[0-9]*.[0-9]* ]]; then
            echo "Error: This workflow must be triggered from a version tag (v*.*.*). Got: ${GH_REF}"
            exit 1
          fi

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish linux-arm64
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj \
            -c Release -r linux-arm64 --self-contained \
            -o publish/linux-arm64

      - name: Create tar.gz
        run: |
          ver="${{ steps.version.outputs.version }}"
          tar -czf "BookDB-v${ver}-linux-arm64.tar.gz" -C publish/linux-arm64 .

      - name: Build AppImage
        run: bash scripts/make-appimage.sh "${{ steps.version.outputs.version }}" aarch64

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: linux-arm64
          path: |
            BookDB-v*-linux-arm64.tar.gz
            BookDB-v*-aarch64.AppImage

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - arch: x64
            rid: osx-x64
          - arch: arm64
            rid: osx-arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Validate tag format
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ "${GH_REF}" != refs/tags/v[0-9]*.[0-9]*.[0-9]* ]]; then
            echo "Error: This workflow must be triggered from a version tag (v*.*.*). Got: ${GH_REF}"
            exit 1
          fi

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/BookDB.Desktop/BookDB.Desktop.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained \
            -o publish/${{ matrix.rid }}

      - name: Build App Bundle and DMG
        run: bash scripts/make-appbundle.sh "${{ matrix.arch }}" "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: osx-${{ matrix.arch }}
          path: BookDB-v*-osx-${{ matrix.arch }}.dmg

  release:
    needs: [build-windows, build-windows-arm64, build-linux, build-linux-arm64, build-macos]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ "${GH_REF}" != refs/tags/v[0-9]*.[0-9]*.[0-9]* ]]; then
            echo "Error: This workflow must be triggered from a version tag (v*.*.*). Got: ${GH_REF}"
            exit 1
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true
          path: artifacts/

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          draft: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
