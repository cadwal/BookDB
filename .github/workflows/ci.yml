name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.x"

jobs:
  # Builds and tests the whole solution — including every remote-database provider (PostgreSQL, MySQL,
  # and MariaDB) — across the release OS matrix; the managed drivers must build and test everywhere. The
  # Testcontainers integration tests for all three engines run for real on the Linux runners, where Docker
  # is preinstalled; on Windows and macOS runners no Linux-container daemon is reachable, so the fixtures
  # skip cleanly. The gate is the reachable Docker daemon, never a hardcoded per-database OS list.
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # x64 Linux (the real container gate for all three engines) and Windows (primary dev OS) block;
    # ARM/macOS are best-effort, matching the release workflow's treatment of those runners.
    continue-on-error: ${{ matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore BookDB.slnx

      - name: Build
        run: dotnet build BookDB.slnx -c Release --no-restore

      - name: Test
        run: dotnet test BookDB.slnx -c Release --no-build --verbosity normal
